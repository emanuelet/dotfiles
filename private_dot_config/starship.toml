# No blank line before prompt
add_newline = false

# Simple prompt layout
format = """
$directory\
$git_branch\
$git_status\
$character
"""

# Directory
[directory]
style = "cyan blue"
truncation_length = 3
truncate_to_repo = true

# Git status (very minimal)
[git_status]
style = "red"
format = '[$all_status$ahead_behind]($style) '

# Prompt symbol
[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[nodejs]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[battery]
disabled = true

[time]
disabled = true
